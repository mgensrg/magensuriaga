<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 2026</title>
    <style>
        /* Minimalist Editorial Stylesheet */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfc;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 2rem 5%;
            border-bottom: 1px solid #eaeaea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 5%;
        }

        .portfolio-container {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9; /* Matches standard presentation widescreen dimensions */
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
            border: 1px solid #eaeaea;
        }

        .portfolio-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            padding: 2rem 5%;
            border-top: 1px solid #eaeaea;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 0.05em;
        }

        /* Responsive tweak for smaller laptops/tablets */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
            main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">[YOUR FULL NAME] • PORTFOLIO</div>
        <div class="tagline">Editorial Edition • 2026</div>
    </header>

    <main>
        <div class="portfolio-container">
            <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQ.../embed?start=false&loop=false&delayms=3000" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
            
            </div>
    </main>

    <footer>
        &copy; 2026 • Designed for Impact
    </footer>

</body>
</html>
